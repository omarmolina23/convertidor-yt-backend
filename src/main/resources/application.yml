spring:
  application:
    name: convertidor-yt-backend
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

server:
  # Railway (y otros PaaS) inyectan el puerto en la variable PORT.
  port: ${PORT:8080}
  tomcat:
    max-swallow-size: -1

# Configuración propia del convertidor. Se puede sobreescribir con variables de
# entorno, p.ej. CONVERTER_YTDLPPATH, CONVERTER_WORKDIR.
converter:
  yt-dlp-path: ${CONVERTER_YTDLP_PATH:yt-dlp}
  ffmpeg-path: ${CONVERTER_FFMPEG_PATH:ffmpeg}
  work-dir: ${CONVERTER_WORK_DIR:${java.io.tmpdir}/convertidor-yt}
  # Perillas de contención de recursos (ajustables por entorno en producción).
  retention-minutes: ${CONVERTER_RETENTION_MINUTES:30}
  process-timeout-seconds: ${CONVERTER_PROCESS_TIMEOUT_SECONDS:600}
  # Aceleración de descargas
  use-aria2: ${CONVERTER_USE_ARIA2:true}
  aria2-path: ${CONVERTER_ARIA2_PATH:aria2c}
  aria2-args: ${CONVERTER_ARIA2_ARGS:-x8 -s8 -k1M}
  concurrent-fragments: ${CONVERTER_CONCURRENT_FRAGMENTS:4}
  # Anti-bloqueo de YouTube: cookies de sesión y/o proxy residencial.
  cookies-file: ${CONVERTER_COOKIES_FILE:}
  proxy: ${CONVERTER_PROXY:}
  cors:
    allowed-origins: ${CONVERTER_CORS_ORIGINS:*}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
